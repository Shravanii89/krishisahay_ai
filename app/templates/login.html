{% extends "base.html" %}

{% block title %}Login - KrishiSahay AI{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-custom p-4 p-md-5 bg-white border-0 shadow-lg">
                <div class="text-center mb-4">
                    <div class="icon-circle mx-auto">
                        <i class="fa-solid fa-lock-open"></i>
                    </div>
                    <h2 class="fw-bold">Farmer Login</h2>
                    <p class="text-muted small">Access your profile, documents, and recommendations</p>
                </div>
                
                <form action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" method="POST">
                    <!-- Mobile Number -->
                    <div class="mb-4">
                        <label for="mobile_number" class="form-label form-label-custom">
                            <i class="fa-solid fa-phone text-success me-1"></i> Registered Mobile Number
                        </label>
                        <input type="tel" 
                               name="mobile_number" 
                               id="mobile_number" 
                               class="form-control form-control-custom" 
                               placeholder="e.g. 9876543210" 
                               required 
                               autocomplete="username">
                        <small class="text-muted d-block mt-1">Please enter your 10-digit registered number.</small>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label for="password" class="form-label form-label-custom">
                            <i class="fa-solid fa-key text-success me-1"></i> Password
                        </label>
                        <input type="password" 
                               name="password" 
                               id="password" 
                               class="form-control form-control-custom" 
                               placeholder="******" 
                               required 
                               autocomplete="current-password">
                    </div>

                    <!-- Submit -->
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary-custom btn-lg">
                            <i class="fa-solid fa-sign-in-alt me-2"></i> Log In
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-1 text-muted">New to KrishiSahay AI?</p>
                    <a href="{{ url_for('auth.register') }}" class="fw-semibold text-success">
                        <i class="fa-solid fa-user-plus me-1"></i> Register as a New Farmer
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
